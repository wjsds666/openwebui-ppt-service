version: "3.9"

services:
  ppt-api:
    build:
      context: .
      dockerfile: Dockerfile
      args:
        PPT_MASTER_REPO_URL: ${PPT_MASTER_REPO_URL:-https://github.com/hugohe3/ppt-master.git}
        PPT_MASTER_REPO_REF: ${PPT_MASTER_REPO_REF:-main}
    env_file:
      - .env
    command: uvicorn app.api.main:app --host 0.0.0.0 --port 8099
    ports:
      - "8099:8099"
    volumes:
      - ./storage:/app/storage
    restart: unless-stopped

  ppt-worker:
    build:
      context: .
      dockerfile: Dockerfile
      args:
        PPT_MASTER_REPO_URL: ${PPT_MASTER_REPO_URL:-https://github.com/hugohe3/ppt-master.git}
        PPT_MASTER_REPO_REF: ${PPT_MASTER_REPO_REF:-main}
    env_file:
      - .env
    command: python -m app_worker
    volumes:
      - ./storage:/app/storage
    restart: unless-stopped
